# Configuración golangci-lint v2 (mínima y robusta).
# Docs: https://golangci-lint.run/usage/configuration/
#
# Filosofía: empezar con un set conservador que NO da falsos positivos
# y se puede ampliar gradualmente cuando el proyecto crezca.

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  # `standard` = errcheck + govet + ineffassign + staticcheck + unused.
  # Cubre lo esencial sin ruido. Para añadir más, cambia a `default: none`
  # y enuméralos uno a uno.
  default: standard

  # Si en el futuro quieres añadir linters específicos:
  # enable:
  #   - bodyclose
  #   - gosec
  #   - misspell
  #   - revive

  exclusions:
    rules:
      # Tests: menos exigencia con errores no comprobados (mocks, helpers, etc.).
      - path: _test\.go
        linters:
          - errcheck

# Formatters en sección propia desde v2.
formatters:
  enable:
    - gofmt
    - goimports
