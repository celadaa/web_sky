<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="SnowBreak — Estaciones de esquí y forfaits">
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="55%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0b1d3a"/>
    </linearGradient>
    <linearGradient id="og-snow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#og-bg)"/>

  <!-- Decorative mountains -->
  <path d="M0 480 L160 260 L260 360 L380 220 L520 360 L640 240 L820 380 L960 260 L1080 320 L1200 240 L1200 630 L0 630 Z"
        fill="#0b1d3a" opacity="0.55"/>
  <path d="M0 520 L120 360 L220 420 L340 300 L460 420 L580 320 L760 460 L900 340 L1040 420 L1200 320 L1200 630 L0 630 Z"
        fill="url(#og-snow)" opacity="0.95"/>

  <!-- Snow caps -->
  <path d="M150 280 L160 260 L185 290 L170 285 Z" fill="#ffffff" opacity="0.9"/>
  <path d="M370 240 L380 220 L405 255 L390 250 Z" fill="#ffffff" opacity="0.9"/>
  <path d="M630 260 L640 240 L675 280 L655 270 Z" fill="#ffffff" opacity="0.9"/>

  <!-- Snowflakes -->
  <g stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.7">
    <line x1="980" y1="100" x2="980" y2="160"/>
    <line x1="950" y1="130" x2="1010" y2="130"/>
    <line x1="958" y1="108" x2="1002" y2="152"/>
    <line x1="1002" y1="108" x2="958" y2="152"/>
  </g>
  <g stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.55">
    <line x1="1090" y1="220" x2="1090" y2="260"/>
    <line x1="1070" y1="240" x2="1110" y2="240"/>
  </g>

  <!-- Wordmark and tagline -->
  <text x="80" y="220"
        font-family="'Segoe UI','Helvetica Neue',Inter,Arial,sans-serif"
        font-size="116"
        font-weight="900"
        fill="#ffffff"
        letter-spacing="-3">SnowBreak</text>
  <text x="80" y="290"
        font-family="'Segoe UI','Helvetica Neue',Inter,Arial,sans-serif"
        font-size="36"
        font-weight="600"
        fill="rgba(255,255,255,0.92)">Compara estaciones, nieve y forfaits en segundos.</text>

  <!-- CTA pill -->
  <rect x="80" y="340" width="280" height="64" rx="32" fill="#fb923c"/>
  <text x="220" y="382"
        text-anchor="middle"
        font-family="'Segoe UI','Helvetica Neue',Inter,Arial,sans-serif"
        font-size="22"
        font-weight="700"
        fill="#0b1d3a"
        letter-spacing="0.4">Planifica tu próxima escapada</text>
</svg>
