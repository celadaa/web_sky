<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" role="img" aria-label="Snowbreak">
  <defs>
    <linearGradient id="sbl-mountain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
  </defs>

  <!-- Mountain mass -->
  <path d="M4 50 L24 14 L34 30 L44 18 L60 50 Z" fill="url(#sbl-mountain)"/>
  <!-- Snow caps -->
  <path d="M18 22 L24 14 L28 20 L26 24 Z" fill="#ffffff"/>
  <path d="M40 22 L44 18 L50 28 L46 26 Z" fill="#ffffff"/>

  <!-- Speed swoosh -->
  <path d="M6 56 Q30 60 60 54 L62 56 Q34 62 6 58 Z" fill="#f97316" opacity="0.9"/>

  <!-- Skier silhouette in white for contrast -->
  <g fill="#ffffff">
    <circle cx="34" cy="34" r="2.4"/>
    <path d="M30 36 L36 34 L40 38 L38 41 L34 39 L32 42 Z"/>
    <path d="M28 46 L42 44" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M37 33 L44 30" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  </g>

  <text x="74" y="44"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="30"
        font-weight="900"
        font-style="italic"
        fill="#ffffff"
        letter-spacing="0.5">snowbreak</text>
</svg>
