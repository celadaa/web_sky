<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" role="img" aria-label="Snowbreak">
  <defs>
    <linearGradient id="sb-mountain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="60%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#10243b"/>
    </linearGradient>
    <linearGradient id="sb-snow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="sb-text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="55%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#10243b"/>
    </linearGradient>
  </defs>

  <!-- Mountain mass -->
  <path d="M4 50 L24 14 L34 30 L44 18 L60 50 Z" fill="url(#sb-mountain)"/>
  <!-- Snow caps -->
  <path d="M18 22 L24 14 L28 20 L26 24 Z" fill="url(#sb-snow)"/>
  <path d="M40 22 L44 18 L50 28 L46 26 Z" fill="url(#sb-snow)"/>

  <!-- Speed swoosh under the mountain (orange accent) -->
  <path d="M6 56 Q30 60 60 54 L62 56 Q34 62 6 58 Z" fill="#f97316" opacity="0.9"/>

  <!-- Skier silhouette -->
  <g fill="#0b1728">
    <circle cx="34" cy="34" r="2.4"/>
    <path d="M30 36 L36 34 L40 38 L38 41 L34 39 L32 42 Z"/>
    <path d="M28 46 L42 44" stroke="#0b1728" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M37 33 L44 30" stroke="#0b1728" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Brand text -->
  <text x="74" y="44"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="30"
        font-weight="900"
        font-style="italic"
        fill="url(#sb-text)"
        letter-spacing="0.5">snowbreak</text>
</svg>
