name: Dependency Review

# En cada PR, comprueba que las nuevas dependencias no introducen
# vulnerabilidades conocidas ni licencias no permitidas.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Review new dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          # Bloquea licencias copyleft fuerte que podrían contaminar tu código.
          deny-licenses: AGPL-3.0, GPL-3.0
