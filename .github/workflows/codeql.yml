name: CodeQL

# Análisis estático de seguridad para Go (y JavaScript del frontend si lo añades luego).
# Detecta vulnerabilidades comunes (SQL injection, path traversal, XSS server-side, etc.).
# Los hallazgos aparecen en la pestaña "Security" del repositorio.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Análisis semanal completo, lunes 06:00 UTC.
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        language: [go]
        # Añade "javascript" aquí si en el futuro tienes JS no trivial.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
