name: Gitleaks

# Escanea el historial git en cada push/PR buscando secretos filtrados
# (API keys, passwords, claves privadas...). Si encuentra algo, rompe el build
# y te avisa por la pestaña Security.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1" # lunes 04:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # gitleaks usa sus reglas por defecto, que ya cubren API keys,
          # tokens, claves privadas, etc. Si en el futuro quieres reglas
          # custom, crea .gitleaks.toml en la raíz y descomenta la línea:
          # GITLEAKS_CONFIG: .gitleaks.toml
